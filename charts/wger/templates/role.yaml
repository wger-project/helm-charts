# manage secret permission - for keygen, currently used for jwt key generation
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-secret-role
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,pre-rollback
    helm.sh/hook-weight: "-6"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "patch", "update", "get"]
---
# pod exec permission - currently used for powersync database initialization
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-pod-exec-role
  namespace: {{ .Release.Namespace }}
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# exec is a subresource: it requires `create` on pods/exec, not an `exec` verb on pods
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
