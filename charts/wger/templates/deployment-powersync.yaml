apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-powersync
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}
spec:
  replicas: {{ .Values.powersync.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-powersync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-powersync
      annotations:
    {{- with .Values.powersync.annotations }}
      {{- range $key, $value := . }}
        {{ $key }}: {{ $value | quote}}
      {{- end }}
    {{- end }}
    spec:
      # for using a different service account for the init container -> to init the db
      # prevent the pod’s default SA token from being auto‑mounted.
      automountServiceAccountToken: false
      serviceAccountName: default
      {{- with .Values.powersync.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: powersync
          image: "{{ .Values.powersync.image.registry }}/{{ .Values.powersync.image.repository }}:{{ .Values.powersync.image.tag }}"
          imagePullPolicy: {{ .Values.powersync.image.PullPolicy }}
          env:
            {{- include "database.settings" . | indent 10 }}
            {{- include "powersync.settings" . | indent 10 }}
          #
          # In Kubernetes commands overrides the entrypoint and args adds additional arguments to the entrypoint (command)
          # so in this comment "command" is ment do be "args"
          #
          # The unified service runs an API server and replication worker in the same container.
          # These services can be executed in different containers by using individual entry commands e.g.
          # Start only the API server with
          #   command: ['start', '-r', 'api']
          # Start only the replication worker with
          #   command: ['start', '-r', 'sync']

          # Migrations occur automatically by default. Default migrations can be disabled in `powersync.yaml`:
          #  migrations:
          #   disable_auto_migration: true
          #
          # Service migrations can be manually triggered by starting a container with the
          # following command:
          #     command: ['migrate', 'up']
          # Note that this container must finish executing before starting the sync or unified container.
          args: ["start", "-r", "unified"]
          ports:
            - name: api
              containerPort: 8080
              protocol: TCP
            - name: prometheus
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: powersync-conf
              mountPath: /config
            # the default service account token as we disabled the automount for this pod
            - name: default-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          {{- if .Values.powersync.resources }}
          resources:
            {{- with .Values.powersync.resources }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
      initContainers:
        # init container connects to the wger pod to setup the database and user
        - name: init-container
          image: docker.io/alpine:latest
          # mount the token from the service account for the init container
          volumeMounts:
            - name: init-sa-token
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
          command:
          {{- include "initContainer.psinitdb.command" . | indent 10 }}
      volumes:
        - name: powersync-conf
          configMap:
            name: {{ .Release.Name }}-powersync-configmap
        # projected token volumes – one for each service account
        # Token & CA for the init SA
        - name: init-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: api
                  expirationSeconds: 3600
                  # The service account used for the init container.
                  serviceAccountName: {{ .Release.Name }}-powersync-initdb
              - configMap:
                  name: kube-root-ca.crt
                  items:
                  - key: ca.crt
                    path: ca.crt
        - name: default-sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: api
                  expirationSeconds: 3600
                  # The default service account (empty string means “default”).
                  serviceAccountName: ""
              - configMap:
                  name: kube-root-ca.crt
                  items:
                  - key: ca.crt
                    path: ca.crt
