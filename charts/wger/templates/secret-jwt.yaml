---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.jwt.secret.name | default "jwt" }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade,pre-rollback
    helm.sh/hook-weight: "-5"
stringData:
  # JWT keys, used by the mobile app. This default NEEDS to be changed.
  # Generate fresh keys with: docker compose exec web ./manage.py generate-jwt-keys
  {{ if .Values.app.jwt.private.key }}
  private-key: {{ .Values.app.jwt.private.key | quote }}
  {{ else }}
  private-key: {{  | quote }}
  {{ end }}
  {{ if .Values.app.jwt.public.key }}
  public-key: {{ .Values.app.jwt.public.key | quote }}
  {{ else }}
  public-key: {{  | quote }}
  {{ end }}
